<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>환율 변환기</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f6fb; color: #111827; margin: 0; }
    .container { max-width: 560px; margin: 60px auto; padding: 28px; background: #fff; border-radius: 18px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12); }
    h1 { margin-top: 0; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    input, select, button { width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px; font-size: 16px; }
    input, select { border: 1px solid #d1d5db; margin-bottom: 8px; }
    button { border: none; background: #2563eb; color: #fff; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 18px; }
    .lang-row { display: flex; align-items: center; gap: 10px; width: 220px; }
    .lang-row label { margin: 0; }
    .card { margin-top: 20px; padding: 18px; border-radius: 16px; }
    .success { background: #ecfdf5; color: #064e3b; }
    .error { background: #fee2e2; color: #991b1b; }
    .note { margin-top: 18px; font-size: 14px; color: #475569; }
    .footer { margin-top: 24px; font-size: 13px; color: #64748b; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-left: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h1>환율 변환기</h1>
        <p id="description">대한민국 1000원이 입력한 나라 화폐로 얼마인지 계산합니다.</p>
      </div>
      <div class="lang-row">
        <label for="langSwitch">언어</label>
        <select id="langSwitch">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <label for="country" id="countryLabel">나라 이름</label>
    <input id="country" type="text" placeholder="예: 미국, 일본, 유럽, 중국" />
    <button id="convertButton">환율 조회</button>

    <div id="message"></div>
    <div class="note" id="note">지원하는 나라: 미국, 일본, 유럽, 중국, 영국, 호주, 캐나다, 스위스, 홍콩, 싱가포르, 태국, 말레이시아, 인도, 러시아, 브라질, 멕시코, 터키, 뉴질랜드, 필리핀, 베트남, 대만, 인도네시아</div>
    <div class="footer" id="footer">브라우저에서 직접 실행됩니다. Python 설치가 필요 없습니다.</div>
  </div>

  <script>
    const countryToCurrency = {
      "미국": "USD",
      "USA": "USD",
      "United States": "USD",
      "일본": "JPY",
      "Japan": "JPY",
      "유럽": "EUR",
      "Europe": "EUR",
      "중국": "CNY",
      "China": "CNY",
      "영국": "GBP",
      "UK": "GBP",
      "Britain": "GBP",
      "호주": "AUD",
      "Australia": "AUD",
      "캐나다": "CAD",
      "Canada": "CAD",
      "스위스": "CHF",
      "Switzerland": "CHF",
      "홍콩": "HKD",
      "Hong Kong": "HKD",
      "싱가포르": "SGD",
      "Singapore": "SGD",
      "태국": "THB",
      "Thailand": "THB",
      "말레이시아": "MYR",
      "Malaysia": "MYR",
      "인도": "INR",
      "India": "INR",
      "러시아": "RUB",
      "Russia": "RUB",
      "브라질": "BRL",
      "Brazil": "BRL",
      "멕시코": "MXN",
      "Mexico": "MXN",
      "터키": "TRY",
      "Turkey": "TRY",
      "뉴질랜드": "NZD",
      "New Zealand": "NZD",
      "필리핀": "PHP",
      "Philippines": "PHP",
      "베트남": "VND",
      "Vietnam": "VND",
      "대만": "TWD",
      "Taiwan": "TWD",
      "인도네시아": "IDR",
      "Indonesia": "IDR",
    };

    const langSwitch = document.getElementById('langSwitch');
    const countryInput = document.getElementById('country');
    const convertButton = document.getElementById('convertButton');
    const messageBox = document.getElementById('message');
    const description = document.getElementById('description');
    const countryLabel = document.getElementById('countryLabel');
    const note = document.getElementById('note');
    const footer = document.getElementById('footer');

    const translations = {
      ko: {
        pageTitle: '환율 변환기',
        title: '환율 변환기',
        description: '대한민국 1000원이 입력한 나라 화폐로 얼마인지 계산합니다.',
        countryLabel: '나라 이름',
        placeholder: '예: 미국, 일본, 유럽, 중국',
        button: '환율 조회',
        loading: '조회 중... ',
        note: '지원하는 나라: 미국, 일본, 유럽, 중국, 영국, 호주, 캐나다, 스위스, 홍콩, 싱가포르, 태국, 말레이시아, 인도, 러시아, 브라질, 멕시코, 터키, 뉴질랜드, 필리핀, 베트남, 대만, 인도네시아',
        footer: '브라우저에서 직접 실행됩니다. Python 설치가 필요 없습니다.',
        errors: {
          empty: '나라 이름을 입력해주세요.',
          unsupported: '지원하지 않는 나라입니다. 예: 미국, 일본, 유럽, 중국',
          api: '환율 정보를 가져오는 중 오류가 발생했습니다: '
        },
        result: '1000원은 약 <strong>{converted} {currency}</strong>입니다.<br>환율: 1 KRW = {rate} {currency}'
      },
      en: {
        pageTitle: 'Currency Converter',
        title: 'Currency Converter',
        description: 'Calculate how much 1000 KRW is worth in the selected country currency.',
        countryLabel: 'Country name',
        placeholder: 'e.g. USA, Japan, Europe, China',
        button: 'Get rate',
        loading: 'Loading...',
        note: 'Supported countries: USA, Japan, Europe, China, UK, Australia, Canada, Switzerland, Hong Kong, Singapore, Thailand, Malaysia, India, Russia, Brazil, Mexico, Turkey, New Zealand, Philippines, Vietnam, Taiwan, Indonesia',
        footer: 'Runs directly in your browser. No Python installation required.',
        errors: {
          empty: 'Please enter a country name.',
          unsupported: 'Unsupported country. e.g. USA, Japan, Europe, China',
          api: 'Failed to fetch exchange rate: '
        },
        result: '1000 KRW is approximately <strong>{converted} {currency}</strong>.<br>Rate: 1 KRW = {rate} {currency}'
      }
    };

    function setMessage(text, type = 'success') {
      messageBox.innerHTML = `<div class="card ${type}">${text}</div>`;
    }

    function setLoading(isLoading) {
      convertButton.disabled = isLoading;
      convertButton.innerHTML = isLoading ? `${translations[langSwitch.value].loading}<span class="spinner"></span>` : translations[langSwitch.value].button;
    }

    function applyLanguage(lang) {
      const t = translations[lang];
      document.documentElement.lang = lang;
      document.title = t.pageTitle;
      document.querySelector('h1').textContent = t.title;
      description.textContent = t.description;
      countryLabel.textContent = t.countryLabel;
      countryInput.placeholder = t.placeholder;
      convertButton.textContent = t.button;
      note.textContent = t.note;
      footer.textContent = t.footer;
      messageBox.innerHTML = '';
    }

    async function fetchRate(currency) {
      const response = await fetch('https://open.er-api.com/v6/latest/KRW');
      if (!response.ok) {
        throw new Error(translations[langSwitch.value].errors.api + response.statusText);
      }
      const data = await response.json();
      if (data.result !== 'success') {
        throw new Error(translations[langSwitch.value].errors.api + data.error?.info || 'API error');
      }
      const rate = data.rates[currency];
      if (!rate) {
        throw new Error(`${currency} 환율을 찾을 수 없습니다.`);
      }
      return rate;
    }

    langSwitch.addEventListener('change', () => applyLanguage(langSwitch.value));

    convertButton.addEventListener('click', async () => {
      const lang = langSwitch.value;
      const t = translations[lang];
      const country = countryInput.value.trim();
      if (!country) {
        setMessage(t.errors.empty, 'error');
        return;
      }
      const currency = countryToCurrency[country];
      if (!currency) {
        setMessage(t.errors.unsupported, 'error');
        return;
      }

      try {
        setLoading(true);
        setMessage('', 'success');
        const rate = await fetchRate(currency);
        const converted = (1000 * rate).toFixed(4);
        const resultText = t.result
          .replace('{converted}', converted)
          .replace('{currency}', currency)
          .replace('{rate}', rate.toFixed(6));
        setMessage(resultText);
      } catch (error) {
        setMessage(`${t.errors.api}${error.message}`, 'error');
      } finally {
        setLoading(false);
      }
    });

    applyLanguage('ko');
  </script>
</body>
</html>

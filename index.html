<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>환율 변환기</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f6fb; color: #111827; margin: 0; }
    .container { max-width: 560px; margin: 60px auto; padding: 28px; background: #fff; border-radius: 18px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12); }
    h1 { margin-top: 0; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    input, button { width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px; font-size: 16px; }
    input { border: 1px solid #d1d5db; margin-bottom: 8px; }
    button { border: none; background: #2563eb; color: #fff; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .card { margin-top: 20px; padding: 18px; border-radius: 16px; }
    .success { background: #ecfdf5; color: #064e3b; }
    .error { background: #fee2e2; color: #991b1b; }
    .note { margin-top: 18px; font-size: 14px; color: #475569; }
    .footer { margin-top: 24px; font-size: 13px; color: #64748b; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-left: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>환율 변환기</h1>
    <p>대한민국 1000원이 입력한 나라 화폐로 얼마인지 계산합니다.</p>

    <label for="country">나라 이름</label>
    <input id="country" type="text" placeholder="예: 미국, 일본, 유럽, 중국" />
    <button id="convertButton">환율 조회</button>

    <div id="message"></div>
    <div class="note">지원하는 나라: 미국, 일본, 유럽, 중국, 영국, 호주, 캐나다, 스위스, 홍콩, 싱가포르, 태국, 말레이시아, 인도, 러시아, 브라질, 멕시코, 터키, 뉴질랜드, 필리핀, 베트남, 대만, 인도네시아</div>
    <div class="footer">브라우저에서 직접 실행됩니다. Python 설치가 필요 없습니다.</div>
  </div>

  <script>
    const countryToCurrency = {
      "미국": "USD",
      "일본": "JPY",
      "유럽": "EUR",
      "중국": "CNY",
      "영국": "GBP",
      "호주": "AUD",
      "캐나다": "CAD",
      "스위스": "CHF",
      "홍콩": "HKD",
      "싱가포르": "SGD",
      "태국": "THB",
      "말레이시아": "MYR",
      "인도": "INR",
      "러시아": "RUB",
      "브라질": "BRL",
      "멕시코": "MXN",
      "터키": "TRY",
      "뉴질랜드": "NZD",
      "필리핀": "PHP",
      "베트남": "VND",
      "대만": "TWD",
      "인도네시아": "IDR",
    };

    const countryInput = document.getElementById('country');
    const convertButton = document.getElementById('convertButton');
    const messageBox = document.getElementById('message');

    function setMessage(text, type = 'success') {
      messageBox.innerHTML = `<div class="card ${type}">${text}</div>`;
    }

    function setLoading(isLoading) {
      convertButton.disabled = isLoading;
      convertButton.innerHTML = isLoading ? '조회 중... <span class="spinner"></span>' : '환율 조회';
    }

    async function fetchRate(currency) {
      const response = await fetch('https://open.er-api.com/v6/latest/KRW');
      if (!response.ok) {
        throw new Error('환율 API 요청에 실패했습니다.');
      }
      const data = await response.json();
      if (data.result !== 'success') {
        throw new Error('환율 API 응답이 유효하지 않습니다.');
      }
      const rate = data.rates[currency];
      if (!rate) {
        throw new Error(`${currency} 환율을 찾을 수 없습니다.`);
      }
      return rate;
    }

    convertButton.addEventListener('click', async () => {
      const country = countryInput.value.trim();
      if (!country) {
        setMessage('나라 이름을 입력해주세요.', 'error');
        return;
      }
      const currency = countryToCurrency[country];
      if (!currency) {
        setMessage('지원하지 않는 나라입니다. 예: 미국, 일본, 유럽, 중국', 'error');
        return;
      }

      try {
        setLoading(true);
        setMessage('', 'success');
        const rate = await fetchRate(currency);
        const converted = (1000 * rate).toFixed(4);
        setMessage(`1000원은 약 <strong>${converted} ${currency}</strong>입니다.<br>환율: 1 KRW = ${rate.toFixed(6)} ${currency}`);
      } catch (error) {
        setMessage(`환율 정보를 가져오는 중 오류가 발생했습니다: ${error.message}`, 'error');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
